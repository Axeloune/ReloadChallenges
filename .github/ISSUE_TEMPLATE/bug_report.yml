name: Bug report
description: Signaler un bug du plugin
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explique clairement le bug rencontré.
    validations:
      required: true
  - type: input
    id: paper
    attributes:
      label: Version Paper
      placeholder: "ex: 26.2 build ..."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Étapes de reproduction
      description: Liste les étapes pour reproduire le bug.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Colle les logs utiles si tu en as.
      render: text
